id = "url-chooser"
name = "URL Chooser"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Choose and open URLs from the focused Herdr pane"
platforms = ["macos"]

[[actions]]
id = "open"
title = "Choose URL from focused pane"
contexts = ["global"]
command = ["bash", "open.sh"]

[[panes]]
id = "picker"
title = "URLs"
placement = "overlay"
command = ["bash", "-c", "exec bash \"$HERDR_PLUGIN_ROOT/picker.sh\""]
